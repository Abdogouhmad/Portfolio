<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="16" fill="#18181b" />
  
  <!-- Outer TUI Window Border -->
  <rect x="15" y="15" width="70" height="70" rx="6" fill="none" stroke="#27272a" stroke-width="3" />
  <line x1="15" y1="32" x2="85" y2="32" stroke="#27272a" stroke-width="2" />
  
  <!-- Left Side: Bar Charts -->
  <line x1="25" y1="45" x2="45" y2="45" stroke="#a1a1aa" stroke-width="4" stroke-linecap="round" />
  <line x1="25" y1="55" x2="40" y2="55" stroke="#a1a1aa" stroke-width="4" stroke-linecap="round" />
  <line x1="25" y1="65" x2="48" y2="65" stroke="#a1a1aa" stroke-width="4" stroke-linecap="round" />
  
  <!-- Right Side: CPU Waveform -->
  <path d="M 55 70 L 60 68 L 65 52 L 70 73 L 75 42 L 80 62" fill="none" stroke="#f4f4f5" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
  
